<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barber App</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Configuración de Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        'barber-primary': '#1a1a1a',
                        'barber-secondary': '#8b7355',
                        'barber-accent': '#d4af37',
                    }
                }
            }
        }
    </script>
</head>
<body class="font-montserrat bg-gray-50">
    
    <!-- Navegación -->
    <nav class="bg-barber-primary text-white shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center space-x-2">
                    <svg class="w-8 h-8 text-barber-accent" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                    </svg>
                    <a href="index.html" class="text-xl font-bold">Barber Studio</a>
                </div>
                
                <div class="hidden md:flex space-x-6">
                    <a href="index.html" class="hover:text-barber-accent transition-colors">Inicio</a>
                    <a href="servicios.html" class="hover:text-barber-accent transition-colors">Servicios</a>
                    <a href="reservar.html" class="hover:text-barber-accent transition-colors">Reservar</a>
                    <a href="galeria.html" class="hover:text-barber-accent transition-colors">Galería</a>
                    <a href="contacto.html" class="hover:text-barber-accent transition-colors">Contacto</a>
                </div>
                
                <a href="index.html" class="bg-barber-accent text-barber-primary px-4 py-2 rounded-lg font-semibold hover:bg-yellow-500 transition-colors">
                    Volver
                </a>
            </div>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <main class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full space-y-8">
            <div>
                <div class="mx-auto h-20 w-20 bg-barber-accent rounded-full flex items-center justify-center">
                    <svg class="h-12 w-12 text-barber-primary" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
                <h2 class="mt-6 text-center text-3xl font-extrabold text-barber-primary">
                    Iniciar Sesión
                </h2>
                <p class="mt-2 text-center text-sm text-gray-600">
                    ¿No tienes cuenta? 
                    <a href="registro.html" class="font-medium text-barber-accent hover:text-yellow-500">
                        Regístrate aquí
                    </a>
                </p>
            </div>
            
            <form class="mt-8 space-y-6">
                <div class="space-y-4">
                    <div>
                        <label for="telefono" class="block text-sm font-medium text-gray-700">
                            Teléfono
                        </label>
                        <input 
                            id="telefono" 
                            name="telefono" 
                            type="tel" 
                            required 
                            class="mt-1 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-barber-accent focus:border-barber-accent focus:z-10 sm:text-sm" 
                            placeholder="+34 600 123 456"
                        >
                    </div>
                    
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">
                            Contraseña
                        </label>
                        <input 
                            id="password" 
                            name="password" 
                            type="password" 
                            required 
                            class="mt-1 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-barber-accent focus:border-barber-accent focus:z-10 sm:text-sm" 
                            placeholder="Tu contraseña"
                        >
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input 
                            id="remember-me" 
                            name="remember-me" 
                            type="checkbox" 
                            class="h-4 w-4 text-barber-accent focus:ring-barber-accent border-gray-300 rounded"
                        >
                        <label for="remember-me" class="ml-2 block text-sm text-gray-900">
                            Recordarme
                        </label>
                    </div>

                    <div class="text-sm">
                        <a href="#" class="font-medium text-barber-accent hover:text-yellow-500">
                            ¿Olvidaste tu contraseña?
                        </a>
                    </div>
                </div>

                <div>
                    <button 
                        type="submit" 
                        class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-barber-primary bg-barber-accent hover:bg-yellow-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-barber-accent transition-colors"
                    >
                        Iniciar Sesión
                    </button>
                </div>

                <div class="mt-6">
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-300"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-2 bg-gray-50 text-gray-500">O</span>
                        </div>
                    </div>

                    <div class="mt-6">
                        <button 
                            type="button" 
                            class="w-full flex justify-center items-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-barber-accent"
                        >
                            <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12.24 10.285V14.4h6.806c-.275 1.765-2.056 5.174-6.806 5.174-4.095 0-7.439-3.389-7.439-7.574s3.345-7.574 7.439-7.574c2.33 0 3.891.989 4.785 1.849l3.254-3.138C18.189 1.186 15.479 0 12.24 0c-6.635 0-12 5.365-12 12s5.365 12 12 12c6.926 0 11.52-4.869 11.52-11.726 0-.788-.085-1.39-.189-1.989H12.24z"/>
                            </svg>
                            Iniciar con Google
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-barber-primary text-white py-8">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2024 Barber Studio. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const telefono = document.getElementById('telefono').value;
            const password = document.getElementById('password').value;
            
            // Simulación de login (se conectará con Supabase después)
            console.log('Login intent:', { telefono, password });
            
            // Redirección temporal al perfil
            window.location.href = 'perfil.html';
        });
    </script>
</body>
</html>
