<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Barber Studio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Configuración de Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        'barber-primary': '#1a1a1a',
                        'barber-secondary': '#8b7355',
                        'barber-accent': '#d4af37',
                    }
                }
            }
        }
    </script>
</head>
<body class="font-montserrat bg-gray-50">
    
    <!-- Contenido Principal -->
    <main class="min-h-screen flex items-center justify-center py-12 px-4 bg-gradient-to-br from-barber-primary to-gray-900">
        <div class="max-w-md w-full">
            <div class="bg-white rounded-lg shadow-xl overflow-hidden">
                <div class="bg-barber-primary text-white p-6 text-center">
                    <div class="mx-auto h-16 w-16 bg-barber-accent rounded-full flex items-center justify-center mb-4">
                        <svg class="h-10 w-10 text-barber-primary" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold">Panel de Administración</h2>
                    <p class="text-barber-accent mt-2">Barber Studio</p>
                </div>
                
                <div class="p-8">
                    <form id="adminLoginForm" class="space-y-6">
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700">
                                Email Administrador
                            </label>
                            <input 
                                id="email" 
                                name="email" 
                                type="email" 
                                required 
                                class="mt-1 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-barber-accent focus:border-barber-accent focus:z-10 sm:text-sm" 
                                placeholder="admin@barberstudio.com"
                            >
                        </div>
                        
                        <div>
                            <label for="password" class="block text-sm font-medium text-gray-700">
                                Contraseña
                            </label>
                            <input 
                                id="password" 
                                name="password" 
                                type="password" 
                                required 
                                class="mt-1 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-barber-accent focus:border-barber-accent focus:z-10 sm:text-sm" 
                                placeholder="Contraseña de administrador"
                            >
                        </div>

                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <input 
                                    id="remember-admin" 
                                    name="remember-admin" 
                                    type="checkbox" 
                                    class="h-4 w-4 text-barber-accent focus:ring-barber-accent border-gray-300 rounded"
                                >
                                <label for="remember-admin" class="ml-2 block text-sm text-gray-900">
                                    Recordar sesión
                                </label>
                            </div>
                        </div>

                        <div>
                            <button 
                                type="submit" 
                                class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-barber-primary bg-barber-accent hover:bg-yellow-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-barber-accent transition-colors"
                            >
                                Acceder al Panel
                            </button>
                        </div>
                    </form>
                    
                    <div class="mt-6 text-center">
                        <a href="../index.html" class="text-sm text-gray-600 hover:text-barber-accent transition-colors">
                            ← Volver a la web principal
                        </a>
                    </div>
                </div>
            </div>
            
            <!-- Alerta de seguridad -->
            <div class="mt-4 bg-red-50 border border-red-200 rounded-lg p-4">
                <div class="flex items-center">
                    <svg class="w-5 h-5 text-red-600 mr-2" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                    </svg>
                    <p class="text-sm text-red-700">
                        <strong>Acceso restringido:</strong> Esta área es solo para personal autorizado de Barber Studio.
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- JavaScript -->
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Credenciales de demostración (en producción esto iría a Supabase Auth)
            if (email === 'admin@barberstudio.com' && password === 'admin123') {
                // Guardar sesión de admin (en producción usar tokens seguros)
                localStorage.setItem('adminToken', 'demo-admin-token');
                localStorage.setItem('adminEmail', email);
                
                // Redirigir al dashboard
                window.location.href = 'dashboard.html';
            } else {
                // Mostrar error
                alert('Credenciales incorrectas. Use: admin@barberstudio.com / admin123');
            }
        });
        
        // Verificar si ya hay sesión activa
        window.addEventListener('load', function() {
            const adminToken = localStorage.getItem('adminToken');
            if (adminToken) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
